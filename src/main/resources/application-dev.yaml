# ── Development Profile ─────────────────────────────────
# Aktif secara default saat development lokal.
# Usage: spring.profiles.active=dev (atau cukup jalankan tanpa profile)

spring:
  jpa:
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.tujuhsembilan.smartedutelu: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
