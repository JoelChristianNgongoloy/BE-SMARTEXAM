server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: smartedutelu

  # ── PostgreSQL ──────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartedutelu}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  # ── JPA / Hibernate ────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  # ── Flyway ─────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # ── Redis ──────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # ── Mail ───────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ── JWT / Auth ─────────────────────────────────────────
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:dGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9yRGV2ZWxvcG1lbnRPbmx5UGxlYXNlQ2hhbmdlSW5Qcm9k}
      expiration-ms: ${JWT_EXPIRATION:86400000} # 1 Hari (access token)
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000} # 7 Hari (refresh token)
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  seeder:
    enabled: ${SEEDER_ENABLED:false}
  mail:
    from: ${MAIL_FROM:noreply@smartexam.com}
    password-reset-url: ${PASSWORD_RESET_URL:http://localhost:5173/reset-password}
  rate-limit:
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:10}
    window-ms: ${RATE_LIMIT_WINDOW_MS:60000}

# ── Actuator ───────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.tujuhsembilan.smartedutelu: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_SQL:WARN}
