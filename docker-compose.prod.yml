# ═══════════════════════════════════════════════════════════════
# SmartEdu Telu — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════

services:
  # ── Spring Boot App ───────────────────────────────────
  # Nginx global di host reverse proxy ke port 8080
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartedutelu-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file: .env
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-smartedutelu}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      SEEDER_ENABLED: ${SEEDER_ENABLED:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://smartexam.jiilan.me}
      MAIL_FROM: ${MAIL_FROM:-noreply@smartexam.com}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL:-https://smartexam.jiilan.me/reset-password}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartedutelu-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: smartedutelu-postgres
    restart: unless-stopped
    # No external port exposed in production
    environment:
      POSTGRES_DB: ${DB_NAME:-smartedutelu}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - smartedutelu-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-smartedutelu}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartedutelu-redis
    restart: unless-stopped
    # No external port exposed in production
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - smartedutelu-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  smartedutelu-net:
    driver: bridge
