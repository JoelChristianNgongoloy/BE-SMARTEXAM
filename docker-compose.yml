services:
  # ── Spring Boot App ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartedutelu-app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-smartedutelu}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartedutelu-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: smartedutelu-postgres
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-smartedutelu}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: --auth-host=trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - smartedutelu-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-smartedutelu}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartedutelu-redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - smartedutelu-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── pgAdmin (dev only) ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartedutelu-pgadmin
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@smartedutelu.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartedutelu-net

  # ── RedisInsight (dev only) ──────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: smartedutelu-redisinsight
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "${REDISINSIGHT_PORT:-5540}:5540"
    volumes:
      - redisinsight-data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smartedutelu-net

  # ── Mailpit (dev only — local SMTP testing) ─────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: smartedutelu-mailpit
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - smartedutelu-net

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  pgadmin-data:
    driver: local
  redisinsight-data:
    driver: local

networks:
  smartedutelu-net:
    driver: bridge
