# ─── Nginx: SmartExam Backend API ───────────────────────────
# Domain: besmartexam.jiilan.me → reverse proxy ke Spring Boot :8080

# Rate limiting zone (shared across workers)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Upstream backend
upstream smartexam_backend {
    server app:8080;
    keepalive 32;
}

# ── HTTP → redirect semua ke HTTPS ──────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name besmartexam.jiilan.me;

    # Certbot challenge (untuk issue/renew SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect semua ke HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS → reverse proxy ke Spring Boot ────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name besmartexam.jiilan.me;

    # ── SSL Certificates (Let's Encrypt) ────────────────────
    ssl_certificate     /etc/letsencrypt/live/besmartexam.jiilan.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/besmartexam.jiilan.me/privkey.pem;

    # ── SSL Configuration ───────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logging ─────────────────────────────────────────────
    access_log /var/log/nginx/besmartexam.access.log;
    error_log  /var/log/nginx/besmartexam.error.log;

    # ── Request limits ──────────────────────────────────────
    client_max_body_size 20M;

    # ── Reverse Proxy ke Spring Boot /api/* ─────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://smartexam_backend/api/;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # Connection keep-alive ke upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # ── Swagger UI (opsional, bisa dimatikan di production) ──
    location /api/swagger-ui/ {
        proxy_pass http://smartexam_backend/api/swagger-ui/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v3/api-docs {
        proxy_pass http://smartexam_backend/api/v3/api-docs;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check endpoint (untuk monitoring) ────────────
    location /api/actuator/health {
        proxy_pass http://smartexam_backend/api/actuator/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Block dotfiles ──────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Default: 404 ────────────────────────────────────────
    location / {
        return 404 '{"success":false,"message":"Not Found"}';
        add_header Content-Type application/json;
    }
}
